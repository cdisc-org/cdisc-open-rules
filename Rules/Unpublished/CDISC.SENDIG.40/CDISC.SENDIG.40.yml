    # P.S. This doesn't use the define.xml!
    # does_not_use_valid_codelist_terms works with the define.xml
    # so we very probably need an operator that looks up whether the variable has CT defined in the IG
    #
    # TODO: Rule implementation should
    # a) iterate over all variables
    # b) for each of them, check whether there is an associated codelist
    # c) check whether the codelist is non-extensible
    # d) check whether all values in the dataset are in the list from the associated codelist

    #codelistcheck: value # can be "value" or "code"
    #codelistlevel: term # can be "term" or "codelist"
    - name: LBTESTCD # name: variable_name
      operator: does_not_use_valid_codelist_terms
      # Next line must become a lookup in the IG
      value: LBTESTCD # means terms of LBTESTCD codelist - TODO: replace by lookup for corresponding codelist
