Check:
  all:
    - name: variable_name
      operator: not_prefix_matches_regex
      prefix: 0
      value: '[A-Z]'

Core:
  Id: CDISC.ADaMIG.AD0014
  Status: Draft
  Version: '1'
Description: ''
Executability: Fully Executable
Outcome:
  Message: A variable name does not start with a letter (A-Z)
  Output Variables:
    - variable_name
    - variable_label

Rule Type: Variable Metadata Check
Scope:
  Data Structures:
    Include:
      - ALL
  Datasets:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
    include_split_datasets: true
  Subclasses:
    Include:
      - ALL
Sensitivity: Dataset
