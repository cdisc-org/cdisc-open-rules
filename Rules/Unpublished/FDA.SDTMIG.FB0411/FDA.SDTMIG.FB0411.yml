Check:
  all:
    - name: PC
      operator: exists
    - name: ItemGroupDef
      operator: is_inconsistent_across_dataset
      value:
        - Domain: PC
        - Attribute: def:HasNoData
        - Value: 'Yes'
Core:
  Id: FDA.SDTMIG.FB0411
  Status: Draft
  Version: '1'
Description: PC dataset is present in the submission
Executability: Fully Executable
Outcome:
  Message: Dataset PC is missing
  Output Variables:
    - PC
    - ItemGroupDef.def:HasNoData
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - PC
Sensitivity: Record
