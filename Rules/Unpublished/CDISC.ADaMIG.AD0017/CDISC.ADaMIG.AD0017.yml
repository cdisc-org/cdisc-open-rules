Check:
  all:
    - name: variable_data_type # ariable_value to work with other rule types than value metadata check against the define-xml #895 
      operator: equal_to
      value: char
    - name: variable_value
      operator: longer_than
      value: 200
Core:
  Id: CDISC.ADaMIG.AD0017
  Status: Draft
  Version: '1'
Description: Variable Value must not be greather than 200 characters long
Executability: Fully Executable
Outcome:
  Message: Variable value is greather than 200 characters long
  Output Variables:
    - variable_name
Rule Type: Record Data

Scope:
  Data Structures:
    Include:
      - ALL
  Datasets:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
    include_split_datasets: true
  Subclasses:
    Include:
      - ALL

Sensitivity: Record
