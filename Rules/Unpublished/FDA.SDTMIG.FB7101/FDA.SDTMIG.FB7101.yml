Check:
  all:
    - name: PPCAT
      operator: non_empty
    - name: PPSPEC
      operator: not_equal_to
      value: RELREC.PCSPEC
    - name: PPCAT
      operator: equal_to
      value: RELREC.PCTEST
Core:
  Id: FDA.SDTMIG.FB7101
  Status: Draft
  Version: '1'
Description: 'For the same drug or metabolite (PCTEST), specimen type (PCSPEC)
  should be consistent across pharmacokinetic datasets within a submission.'
Executability: Partially Executable
Match Datasets:
  - Name: RELREC
    Wildcard: PC
Outcome:
  Message: PCSPEC is not equal to PPSPEC for the same drug or metabolite.
  Output Variables:
    - PPCAT
    - PPSPEC
    - PPCAT
    - RELREC.PCSPEC
    - RELREC.PCTEST
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
      - RELATIONSHIP
  Domains:
    Include:
      - PP
      - PC
      - RELREC
Sensitivity: Record
