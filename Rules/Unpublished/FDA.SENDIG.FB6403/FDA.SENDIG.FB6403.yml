Check:
  all:
    - all:
        - name: "RFSTDTC"
          operator: "date_not_equal_to"
          value: "$ex_exstdtc"
    - any:
        - name: "RFSTDTC"
          operator: "date_equal_to"
          value: "$pr_prstdtc"
        - name: "RFSTDTC"
          operator: "date_equal_to"
          value: "$cm_cmstdtc"
        - name: "RFSTDTC"
          operator: "date_equal_to"
          value: "$ag_agstdtc"
Core:
  Id: FDA.SENDIG.FB6403
  Status: Draft
  Version: '1'
Description: 'RFSTDTC should be the first treatment exposure date/time from EX
  and not equal to start dates from PR/CM/AG'
Executability: Fully Executable
Operations:
  - domain: "EX"
    group:
      - USUBJID
    id: "$ex_exstdtc"
    name: "EXSTDTC"
    operator: "min_date"
  - domain: "PR"
    group:
      - USUBJID
    id: "$pr_prstdtc"
    name: "PRSTDTC"
    operator: "min_date"
  - domain: "CM"
    group:
      - USUBJID
    id: "$cm_cmstdtc"
    name: "CMSTDTC"
    operator: "min_date"
  - domain: "AG"
    group:
      - USUBJID
    id: "$ag_agstdtc"
    name: "AGSTDTC"
    operator: "min_date"
Outcome:
  Message: 'RFSTDTC is not the first treatment exposure date/time from EX and
    equal to one of the start dates from PR/CM/AG'
  Output Variables:
    - RFSTDTC
    - $ex_exstdtc
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
      - EX
      - PR
      - CM
      - AG
Sensitivity: Record
