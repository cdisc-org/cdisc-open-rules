Core:
  Id: CDISC.SENDIG.247
  Status: Draft
  Version: '1'
Description: For each TSPARMCD = AGEU, SDESIGN, DOSDUR, EXPENDTC, EXPSTDTC,
  GLPTYP, ROUTE, SNDIGVER, SNDCTVER, SPECIES, SPLRNAM, SPREFID, SSPONSOR, STCAT,
  STDIR, STRAIN, STSTDTC, STITLE, SSTYP, TRT, TFCNTRY, TSTFLOC, TSTFNAM, TRMSAC,
  TRTCAS, TRTV, a record must be present in TS
Executability: Fully Executable
Operations:
  - id: $distinct_tsparmcd
    name: TSPARMCD
    operator: distinct
Outcome:
  # TODO? Can we add soemthing here that shows which one is missing:
  # showing "A not in the list of B"
  Message: A record with TXPARMCD from the list is missing
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TS
Sensitivity: Dataset
