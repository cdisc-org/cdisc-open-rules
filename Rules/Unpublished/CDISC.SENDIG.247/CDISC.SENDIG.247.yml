Check:
  any:
    # 2023-10-09: using not_contains_all causes a false positive as soon as one of the list is missing
    # but always shows the first of the list, even when that one is present
    #- name: TSPARMCD
    #  operator: not_contains_all
    #  value:
    #    - AGEU
    #    - SDESIGN
    #    - DOSDUR
    #    - ROUTE
    # etc ...

    # TODO: the following works, but it does not allow to show which one is missing
    # but I also do not think we should split this rule in 26 parts do we?
    - name: $distinct_tsparmcd
      operator: does_not_contain
      value: AGEU
      value_is_literal: true
    - name: $distinct_tsparmcd
      operator: does_not_contain
      value: SDESIGN
      value_is_literal: true
    - name: $distinct_tsparmcd
      operator: does_not_contain
      value: DOSDUR
      value_is_literal: true
    - name: $distinct_tsparmcd
      operator: does_not_contain
      value: EXPENDTC
      value_is_literal: true
    - name: $distinct_tsparmcd
