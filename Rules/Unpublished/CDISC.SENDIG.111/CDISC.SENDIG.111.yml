      operator: equal_to
      value: false
Core:
  Id: CDISC.SENDIG.111
  Status: Draft
  Version: '1'
Description: Check 'BRTHDTC ORIGIN = collected in the Define-XML document'
Executability: Fully Executable
Outcome:
  Message: "BRTHDTC is not described as being 'Collected' in the define.xml"
# Rule Type: Variable Metadata Check against Define XML - NO!
