Check:
  all:
    # Rule = At least one of VISITDY or --NOMDY is populated as these are required timing variables
    # 2025-05-05: Part that checks on --ORRES commented out due to comment Keith Moseley
    # See jira https://jira.cdisc.org/browse/CORERULES-9243
    #- name: --ORRES
    #  operator: non_empty
    # P.S. --USCHFL is "expected" e.g. in LB,
    # and can only be 'Y' or null
    # 2025-09-30: also when --USCHFL and VISITDY columns (both permissible) are ABSENT
    # Then --NOMDY must be populated
    # PRECONDITIONS: Rule does not apply when --USCHFL is populated
    - any:
        # --USCHFL column is absent or --USCHFL is empty
        - name: --USCHFL
          operator: not_exists
        - name: --USCHFL
          operator: empty
    - any:
        # --VISITDY column is absent or --VISITDY is 
        # P.S. VISITDY = PLANNED Study Day of Collection
        - name: VISITDY
          operator: not_exists
        - name: VISITDY
          operator: 'empty'
    # TEST CONDITION. Remark that --MOMDY is "expected"
    - name: --NOMDY
      operator: 'empty'
Core:
  Id: FDA.SENDIG.FB4702
  Status: Draft
  Version: '1'
# Description: 'Either VISITDY or --NOMDY must be populated when # --ORRES is 
#  populated and --USCHFL is not populated'
Description: VISITDY or --NOMDY should be populated for scheduled records as
  these are required timing variables for identification of the day on which
  group summaries (Group Means and Incidences) are calculated.
Executability: Fully Executable
Outcome:
  #Message: 'Either VISITDY or --NOMDY must be populated when --ORRES is populated
  #  and --USCHFL is not populated'
  Message: Missing VISITDY or --NOMDY values for scheduled record.
Rule Type: Record Data
Scope:
  Classes:
    Include:
      # we can set to "FINDINGS", as --ORRES is only possible in FINDINGS
      - FINDINGS
  Domains:
    Include:
      - BW
      - CL
      - CV
      - EG
      - LB
      - PC
      - PM
      - PP
      - RE
      - VS
Sensitivity: Record
