# Variable: ELEMENT
# Condition: ELEMENT is associated with > 1 EPOCH
# Rule: ELEMENT value does not refer to any specific EPOCH
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        Version: '3.4'
        References:
          - Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0323
              Version: '1'
            Version: '2.0'
            Citations:
              - Cited Guidance: TESTRL should be expressed without referring to Epoch.
                  If the Element appears in more than one Epoch in the Trial Arms
                  dataset, then the Element description (ELEMENT) must not refer to
                  any Epochs.
                Document: IG v3.4
                Item: Assumption 9
                Section: 7.2.2
      - Name: SDTMIG
        Version: '3.2'
        References:
          - Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0323
              Version: '1'
            Version: '2.0'
            Citations:
              - Cited Guidance: TESTRL should be expressed without referring to Epoch.
                  If the Element appears in more than one Epoch in the Trial Arms
                  dataset; then the Element description (ELEMENT) must not refer to
                  any Epochs.
                Document: IG v3.2
                Item: Assumption 9 for TE
                Section: '7.2'
      - Name: SDTMIG
        Version: '3.3'
        References:
          - Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0323
              Version: '1'
            Version: '2.0'
            Citations:
              - Cited Guidance: TESTRL should be expressed without referring to Epoch.
                  If the Element appears in more than one Epoch in the Trial Arms
                  dataset; then the Element description (ELEMENT) must not refer to
                  any Epochs.
                Document: IG v3.3
                Item: Assumption 9
                Section: 7.2.2
Check:
  all:
    - name: $ta_element
      operator: is_not_unique_relationship
      value: $ta_epoch
    - name: ELEMENT
      operator: contains
      value: $ta_epoch
Core:
  Id: CDISC.SDTMIG.CG0323
  Status: Draft
  Version: '1'
Description: When ELEMENT is associated with more than 1 EPOCH, ELEMENT should not
  refer to a specific EPOCH.
Executability: Fully Executable
Operations:
  - domain: TA
    id: $ta_element
    name: ELEMENT
    operator: distinct
  - domain: TA
    id: $ta_epoch
    name: EPOCH
    operator: distinct
Outcome:
  Message: ELEMENT refers to a specific EPOCH when ELEMENT is associated with more
    than 1 EPOCH
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TA
      - TE
Sensitivity: Record
