# Variable: GEN
# Condition: Variable Core Status = Expected and data collected
# Rule: Variable value ^= null
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: When the study does not include the data item for an expected
                  variable, however, a null column must still be included in the
                  dataset, and a comment must be included in the Define-XML
                  document to state that the study does not include the data
                  item.
                Document: IG v3.4
                Section: 4.1.5
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0431
              Version: '1'
            Version: '2.0'
        Version: '3.4'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: When no data has been collected for an expected variable;
                  however; a null column must still be included in the dataset;
                  and a comment must be included in the define.xml to state that
                  data was not collected.
                Document: IG v3.2
                Section: 4.1.1.5
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0431
              Version: '1'
            Version: '2.0'
        Version: '3.2'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: When the study does not include the data item for an expected
                  variable; however; a null column must still be included in the
                  dataset; and a comment must be included in the Define-XML
                  document to state that the study does not include the data
                  item.
                Document: IG v3.3
                Section: 4.1.5
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0431
              Version: '1'
            Version: '2.0'
        Version: '3.3'
Check:
  all:
    - name: variable_name
      operator: is_contained_by
      value: $expected_variables
    - name: define_variable_is_collected
      operator: equal_to
      value: true
    - name: variable_is_empty
      operator: equal_to
      value: true
Core:
  Id: CDISC.SDTMIG.CG0431
  Status: Draft
  Version: '1'
Description: Raise an error when the variable Core Status = Expected, data is
  collected, but the variable has no data.
Executability: Fully Executable
Operations:
  - id: $expected_variables
    operator: expected_variables
Outcome:
  Message: Variable is empty, where variable core status is expected and data is
    collected.
  Output Variables:
    - variable_name
    - variable_is_empty
Rule Type: Value Check with Dataset Metadata
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record
