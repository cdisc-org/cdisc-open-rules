# Variable: FATESTCD
# Condition: Collected data fit a Qualifier variable listed in SDTM: Sections 2.2.1, 2.2.2, or 2.2.3, and are represented in the Findings About domain
# Rule: The name of the variable is used as the value of FATESTCD.
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: 'When collected data fit a Qualifier variable listed in SDTM:
                  Sections 3.1.1, 3.1.2, or 3.1.3, and are represented in the
                  Findings About domain, then the name of the variable should be
                  used as the value of FATESTCD.'
