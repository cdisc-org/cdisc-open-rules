Check:
  all:
    - name: variable_label
      operator: longer_than
      value: 40
Core:
  Id: CDISC.ADaMIG.AD0016
  Status: Draft
  Version: '1'
Description: ''
Executability: Fully Executable
Outcome:
  Message: Label must be less than 40 charatcters
  Output Variables:
    - variable_label #log a ticket to get schema updated
    - variable_name

Rule Type: Variable Metadata Check
Scope:
  Data Structures:
    Include:
      - ALL
  Datasets:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
    include_split_datasets: true
  Subclasses:
    Include:
      - ALL
Sensitivity: Record
