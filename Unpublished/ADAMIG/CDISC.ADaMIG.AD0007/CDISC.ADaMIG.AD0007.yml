Check:
  all:
    - name: -- 'FN'
      operator: exists
    - name: ROOT(N)||'FL' # where ROOT(--FN) is  N characters up to LENGTH(--FN)-2
      operator: exists
    - name: --'FN'
      operator: non_empty
    - name: --'FN'
      operator: does_not_contain
      value: (0,1)
Core:
  Id: CDISC.ADaMIG.AD0007
  Status: Draft
  Version: '1'
Description: >-
  'A variable with a suffix of FN must have a value that is not 0, 1 or null'
Executability: Fully Executable
Outcome:
  Message: Variable with a suffix of FN does must have the value  Y, N or null
  Output Variables:
    - --FL
    - --FN
Rule Type: Record Data
Scope:
  Data Structures:
    Include:
      - ALL

  Subclasses:
    Include:
      - ALL

Sensitivity: Record
