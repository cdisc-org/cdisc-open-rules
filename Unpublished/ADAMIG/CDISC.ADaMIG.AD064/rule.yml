Check:
  all:
    - name: variable_name # TRT11AN
      operator: matches_regex # test 1 exist clause
      value: ^TRT[0-9]{2}AN*$
    - name: $generated_variable_name # TRT11A
      operator: is_not_contained_by
      value: variable_name # [TRT11AN, ABCDE, FGHIJ]
Core:
  Id: CDISC.ADaMIG.AD064
  Status: Draft
  Version: '1'
Description: ''
Executability: Fully Executable
Operations:
  - find: ^TRT([0-9]{2})AN*$
    id: $generated_variable_name
    name: variable_name
    operator: regex_find_replace
    replace: TRT\1A
    # generates TRTxxA
    # TRT11AN -> TRT11A
    # ABCDE -> TRTA or null?
Outcome:
  Message: TRTxxAN is present and TRTxxA is not present in ADSL
  Output Variables:
    - USUBJID
    - TRT01AN
Rule Type: Variable Metadata Check
Scope:
  Data Structures:
    Include:
      - SUBJECT LEVEL ANALYSIS DATASET
Sensitivity: Dataset
