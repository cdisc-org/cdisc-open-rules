Check:
  all:
  - name: COMPLFL
    operator: exists
  - name: COMPLFL
    operator: is_not_contained_by
    value:
    - Y
    - N
Core:
  Id: CDISC.ADAMIG.AD0019
  Status: Draft
  Version: '1'
Description: >-
  Raise an error when COMPLFL is present and has a value that is not Y or N
Executability: Fully Executable
Outcome:
  Message: The values of COMPLFL are not following the "Y, N" codelist
  Output Variables:
  - COMPLFL
Rule Type: Record Data
Scope:
  Data Structures:
    Include:
    - SUBJECT LEVEL ANALYSIS DATASET
Sensitivity: Record
