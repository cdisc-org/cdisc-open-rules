                Cited Guidance: >-
                  ADaM IG v1.0, Section 3.1, Table 3.1.1: Population Indicator(s)
                  have a Codelist / Controlled Term value of "Y, N".
Check:
  all:
    - name: PPROTFL
      operator: exists
    - name: PPROTFL
      operator: is_not_contained_by
      value:
        - Y
        - N
Core:
  Id: CDISC.ADAMIG.AD0022
  Status: Draft
  Version: '1'
Description: >-
  Raise an error when PPROTFL is present and has a value that is not Y or N
Executability: Fully Executable
Outcome:
  Message: The values of PPROTFL are not following the "Y, N" codelist
  Output Variables:
    - PPROTFL
Rule Type: Record Data
Scope:
  Data Structures:
    Include:
      - SUBJECT LEVEL ANALYSIS DATASET
Sensitivity: Record
