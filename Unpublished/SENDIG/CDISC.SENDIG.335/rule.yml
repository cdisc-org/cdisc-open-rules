Check:
  all:
    - name: PMLOC
      operator: non_empty
    - name: PMSTRESC
      operator: non_empty
    - name: PMSTRESC
      # operator: contains_case_insensitive
      # EXAMPLE: PSLOC = LEFT HIND LIMB
      #       PSSTRESC = NON-ULCERATED LEFT HIND LIMB
      # operator: equals_string_part - BUT we do not know at what position to start ...
      operator: equals_string_part
      regex: ".{*}(..).*"
      value: PMLOC
      #operator: matches_regex
      # regex: "[a-zA-Z](..)[a-zA-Z]"
      #regex: "*(..)*"
      #value: PMLOC
Core:
  Id: CDISC.SENDIG.335
  Status: Draft
  Version: '1'
Description: Raise an error when PMSTRESC contains (case insensitive) the value of PMLOC
Executability: Fully Executable
# Operations:

Outcome:
  Message: PMSTRESC may not contain the finding with the location specified in PMLOC.
  Output Variables:
    - USUBJID
    - PMTESTCD
    - PMORRES
    - PMSTRESC
    - PMLOC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - PM
Sensitivity: Record
