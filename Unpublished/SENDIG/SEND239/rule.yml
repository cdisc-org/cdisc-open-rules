Check:
  # all:
  # count the number of TRTDOC records within each group
  # CAVEAT: with Sensitivity=Dataset, only the set with the first issue is reported
  # if there are issues with other sets, these are not reported
  # When Sensitivity=Record, a violation is reported for EACH row within the set that violates the rule
  any:
    - name: $num_trtdos
      operator: equal_to
      value: 0
    - name: $num_trtdosu
      operator: equal_to
      value: 0
    - name: $num_armcd
      operator: equal_to
      value: 0
    - name: $num_spgrpcd
      operator: equal_to
      value: 0
    - name: $num_grplbl
      operator: equal_to
      value: 0
Core:
  Status: Draft
  Version: '1'
Description: ''
Executability: Fully Executable
# Within each SETCD group, we must have at least one record 
# with  TXPARMCD = TRTDOS, TRTDOSU, ARMCD, SPGRPCD, and GRPLBL
Operations:
  # count the number of records for TXPARMCD=TRTDOS within each SETCD group
  - filter:
      TXPARMCD: TRTDOS
    group:
      - SETCD
    id: $num_trtdos
    operator: record_count
  # count the number of records for TXOARMCD=TRTDOSU within each SETCD group
  - filter:
      TXPARMCD: TRTDOSU
    group:
      - SETCD
    id: $num_trtdosu
    operator: record_count
  # count the number of records for TXPARMCD=ARMCD within each SETCD group
  - filter:
      TXPARMCD: ARMCD
    group:
      - SETCD
    id: $num_armcd
    operator: record_count
  # count the number of records for TXPARMCD=SPGRPCD within each SETCD group
  - filter:
      TXPARMCD: SPGRPCD
    group:
      - SETCD
    id: $num_spgrpcd
    operator: record_count
  # count the number of records for TXPARMCD=GRPLBL within each SETCD group
  - filter:
      TXPARMCD: GRPLBL
    group:
      - SETCD
    id: $num_grplbl
    operator: record_count
Outcome:
  Message: 'For each set, a record with TXPARMCD=ARMCD, TXPARMCD=SPGRPCD,
    TXPARMCD=GRPLBL, TXPARMCD=TRTDOC and TXPARMCD=TRTDOSU must be provided'
  Output Variables:
    - SETCD
    - $num_trtdos
    - $num_trtdosu
    - $num_armcd
    - $num_spgrpcd
    - $num_grplbl
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TX
# When set to "Dataset" only the first violation is 
# When set to "Record", EVERY row within the set that violates the rule is reported
Sensitivity: Record
