Check:
  all:
    - name: --TPT
      operator: non_empty
    - name: --TPTNUM
      operator: empty
Core:
  Id: CDISC.SENDIG.SEND293
  Status: Draft
  Version: '1'
Description: Raise an error when --TPT is populated but --TPTNUM is not populated.
Executability: Fully Executable
Outcome:
  Message: --TPT is populated but --TPTNUM is not populated
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - ALL
Sensitivity: Record
