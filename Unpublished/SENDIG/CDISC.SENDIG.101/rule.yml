    - name: variable_name
      operator: equal_to
      value: RFENDTC
    - any:
        # TODO: change into define_variable_has_method (function requested https://github.com/cdisc-org/cdisc-rules-engine/issues/1047)
        - name: define_variable_has_comment
          operator: equal_to
          value: false
