Check:
  # Rule: DS has one record per USUBJID in DM
  any:
    # DS.USUBJID must be in DM.USUBJID - is already covered by rule SEND97
    #- all:
    #    - name: USUBJID
    #      operator: non_empty
    #    - name: USUBJID
    #      operator: is_not_contained_by
    #      value: $dm_usubjid
    # DM.USUBJID must be in DS.USUBJID
    - all:
        - name: USUBJID
          operator: non_empty
        - name: USUBJID
          operator: is_not_contained_by
          value: $ds_usubjid
    # TODO: how do we express that for each record in DM, there must exactly be one record in DS?

Core:
  Id: CDISC.SENDIG.140
  Status: Draft
  Version: '1'
Description: Trigger error when USUBJID is not present in DM in DM.USUBJID
Executability: Fully Executable
Operations:
  #- domain: DM
  #  id: $dm_usubjid
  #  name: USUBJID
  #  operator: distinct
  - domain: DS
    id: $ds_usubjid
    name: USUBJID
    operator: distinct
Outcome:
  Message: There is no record in DS or there is more than 1 record in DS for a
    record in DM
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
      - EVENTS
  Domains:
    Include:
      # - DS
      - DM
Sensitivity: Record
