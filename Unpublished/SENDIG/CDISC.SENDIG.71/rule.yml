Check:
  all:
    - name: --DY
      operator: non_empty
    - name: --DTC
      operator: is_complete_date
    - name: RFSTDTC
      operator: is_complete_date
    - name: --DY
      operator: not_equal_to
      value: $val_dy
Core:
  Id: CDISC.SENDIG.71
  Status: Draft
  Version: "1"
Description: --DY = (date portion of --DTC) - (date portion of RFSTDTC) + 1 if
  --DTC is on or after RFSTDTC; --DY = (date portion of --DTC) - (date portion
  of RFSTDTC) if --DTC precedes RFSTDTC
Executability: Fully Executable
Match Datasets:
  - Keys:
      - USUBJID
    Name: DM
Operations:
  - id: $val_dy
    name: --DTC
    operator: dy
Outcome:
  Message: --DY was calculated incorrectly.
  Output Variables:
    - $val_dy
    - --DY
    - --DTC
    - RFSTDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record
