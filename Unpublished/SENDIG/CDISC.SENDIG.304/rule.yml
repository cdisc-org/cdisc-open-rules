  #  level: term
  #  operator: codelist_terms
  #  returntype: value
  - codelist: LBTEST
    id: $extensible
    operator: codelist_extensible
Outcome:
  Message: 'test message'
  Output Variables:
    - LBTESTCD
    - LBTEST
    # - $codelist_terms
    - $extensible
    # - $synonyms
