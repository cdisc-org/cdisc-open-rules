Authorities:
  - Organization: CDISC
    Standards:
      - Name: SENDIG
        Version: '3.0'
        References:
          - Origin: SEND Conformance Rules
            Rule Identifier:
              Id: SEND80
              Version: '1'
            Version: '5.0'
            Citations:
              - Cited Guidance: When using time points, at least one corresponding
                  timing variable should be provided (e.g., VISITDY, --DTC, --DY).
                Document: IG v3.0
                Item: Specification
                Section: 4.2.1
Check:
  all:
    - name: --TPT
      operator: non_empty
    - name: VISITDY
      operator: empty
    - name: --DTC
      operator: empty
    - name: --DY
      operator: empty
# REMARK: ONLY applicable to SENDIG-3.0!
# REMARK: rule says "e.g., VISITDY, --DTC, --DY": is this "e.g." sufficient!
Core:
  Id: CDISC.SENDIG.80
  Status: Draft
  Version: '1'
Description: When --TPT is populated, at least one of VISITDY, --DTC or --DY must
  be populated
Executability: Fully Executable
Outcome:
  Message: --TPT is populated, but none of of VISITDY, --DTC or --DY is populated
  Output Variables:
    - --TPT
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
      - FINDINGS
  Domains:
    Include:
      - ALL

Sensitivity: Record
