Check:
  any:
    # First case: STRAIN
    - all:
        # Only apply when STRAIN is present, as it is "permissible"
        - name: 'STRAIN'
          operator: exists
        - name: STRAIN
          operator: is_inconsistent_across_dataset
          value: SETCD
    # Second case: SPECIES
    - all:
        # only apply when SPECIES is present, as it is "permissible"
        - name: SPECIES
          operator: exists
        - name: SPECIES
          operator: is_inconsistent_across_dataset
          value: SETCD

Core:
  Status: Draft
  Version: '1'
Description: 'DM records with different values for DM.STRAIN must have different
  values for DM.SETCD.'
Executability: Fully Executable
# Operations:
# The following operations, only used for reporting purposes,
# were removed as they cause a "scope skip" when either the STRAIN or SPECIES COLUMN is absent
# - domain: DM
#  group:
#    - SETCD
#  id: $distinct_strain
# within the group with identical values for SETCD. get the distinct values
#  name: STRAIN
#  operator: distinct
#- domain: DM
#  group:
#    - SETCD
#  id: $distinct_species
# within the group with identical values for SETCD. get the distinct values
#  name: SPECIES
#  operator: distinct
Outcome:
  Message: 'Within each SETCD, only a single STRAIN and only a single SPECIES is
    allowed'
  Output Variables:
    - STRAIN
    - SPECIES
    #- $distinct_strain
    #- $distinct_species
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
