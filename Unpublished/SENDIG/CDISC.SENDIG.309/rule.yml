Core:
  Id: CDISC.SENDIG.309
  Status: Draft
  Version: '1'
Description: DM records with different values for SPECIES may not have the same SETCD value.
Executability: Fully Executable
Outcome:
  Message: The same SETCD is assigned to different SPECIES
  Output Variables:
    - SPECIES
    - SETCD
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
