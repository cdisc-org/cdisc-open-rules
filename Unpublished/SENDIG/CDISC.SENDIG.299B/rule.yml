Check:
  all:
    - name: 'variable_name'
      operator: not_equal_to
      value: 'STUDYID'
    - name: 'variable_name'
      operator: not_equal_to
      value: 'RDOMAIN'
    - name: 'variable_name'
      operator: not_equal_to
      value: 'USUBJID'
    - name: 'variable_name'
      operator: not_equal_to
      value: 'POOLID'
    - name: 'variable_name'
      operator: not_equal_to
      value: 'IDVAR'
    - name: 'variable_name'
      operator: not_equal_to
      value: 'IDVARVAL'
    - name: 'variable_name'
      operator: not_equal_to
      value: 'QNAM'
    - name: 'variable_name'
      operator: not_equal_to
      value: 'QLABEL'
    - name: 'variable_name'
      operator: not_equal_to
      value: 'QVAL'
    - name: 'variable_name'
      operator: not_equal_to
      value: 'QORIG'
    - name: 'variable_name'
      operator: not_equal_to
      value: 'QEVAL'
Core:
  Id: CDISC.SENDIG.299B
  Status: Draft
  Version: '1'
Description: 'No other variables other variables than STUDYID, RDOMAIN, USUBJID,
  POOLID, IDVAR, IDVARVAL, QNAM, QLABEL, QVAL, QORIG, QEVAL may be present in
  the SUPP-- dataset'
Executability: Fully Executable
Outcome:
  Message: 'SUPPxx may not contain any other variables than STUDYID, RDOMAIN,
    USUBJID, POOLID, IDVAR, IDVARVAL, QNAM, QLABEL, QVAL, QORIG, QEVAL'
Rule Type: Variable Metadata Check
Scope:
  Classes:
    Include:
      - RELATIONSHIP
  Domains:
    Include:
      - SUPP--
Sensitivity: Dataset
