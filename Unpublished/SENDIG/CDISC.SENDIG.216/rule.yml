Check:
  any:
    - all:
        - name: ETCD
          operator: is_not_unique_set
          value:
            - ELEMENT
            - TESTRL
            - TEENRL
        - name: TEDUR
          operator: not_exists
    - all:
        - name: ETCD
          operator: is_not_unique_set
          value:
            - ELEMENT
            - TESTRL
            - TEDUR
        - name: TEENRL
          operator: not_exists
    - name: ETCD
      operator: is_not_unique_set
      value:
        - ELEMENT
        - TESTRL
        - TEENRL
        - TEDUR
Core:
  Id: CDISC.SENDIG.216
  Status: Draft
  Version: '1'
Description: The combination of ELEMENT, TESTRL, TEENRL, and TEDUR must be
  unique for each ETCD.
Executability: Fully Executable
Outcome:
  Message: The combination of ELEMENT, TESTRL, TEENRL, and TEDUR is not unique for
    each ETCD
  Output Variables:
    - ELEMENT
    - TESTRL
    - TEENRL
    - TEDUR
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TE
Sensitivity: Dataset
