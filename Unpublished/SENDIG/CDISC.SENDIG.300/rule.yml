Check:
  all:
    - name: $record_count
      operator: equal_to
      value: 0
    # check whether there is an entry for the dataset in the define.xml
    #- name: define_dataset_name
    #  operator: exists
    - name: define_dataset_name
      operator: exists
      #value: 'Not in dataset'
      #operator: not_equal_to
      #value: dataset_name
Core:
  Id: CDISC.SENDIG.300
  Status: Draft
  Version: '1'
Description: Trigger error when a dataset has no records
Executability: Fully Executable
Operations:
  - id: $record_count
    operator: record_count
Outcome:
  Message: Dataset may not be empty, it must contain records
  Output Variables:
    - dataset_name
    - dataset_label
    - $record_count
    - define_dataset_name
Rule Type: Dataset Metadata Check against Define XML
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Dataset
