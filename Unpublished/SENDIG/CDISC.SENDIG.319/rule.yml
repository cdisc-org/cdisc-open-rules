Check:
  all:
    - name: --DTC
      operator: empty
    - name: --DY
      operator: empty
    - name: --NOMDY
      operator: empty
Core:
  Id: CDISC.SENDIG.319
  Status: Draft
  Version: '1'
Description: If --DTC and --DY were not collected, --NOMDY must be populated.
Executability: Fully Executable
Outcome:
  Message: --DTC and --DY are not populated, so --NOMDY must be populated
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - LB
      - CL
Sensitivity: Record
