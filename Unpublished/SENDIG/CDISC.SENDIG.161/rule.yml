Check:
  any:
    - name: CLRESCAT
      operator: equal_to
      value: CLTEST
    - name: CLRESCAT
      operator: equal_to
      value: CLSCAT
Core:
  Id: CDISC.SENDIG.161
  Status: Draft
  Version: '1'
Description: Trigger error when CLRESCAT is equal to CLTEST or when CLRESCAT is equal
  to CLSCAT
Executability: Fully Executable
Outcome:
  Message: CLRESCAT may not be equal to CLTEST and CLRESCAT may not be equal to CLSCAT
  Output Variables:
    - CLRESCAT
    - CLTEST
    - CLSCAT
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - CL
Sensitivity: Record
