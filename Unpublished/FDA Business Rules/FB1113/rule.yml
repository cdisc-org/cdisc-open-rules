# Variable: TSPARMCD
# Condition: 
# Success Criteria: The count of occurrences of TSPARAMCD = <value> not in the set (‘FCNTRY’, ‘OBJPRIM’, ‘OBJSEC’, ‘OUTMSPRI’, ‘OUTMSSEC’, 'RANDQT', ‘REGID’, ‘TITLE’, ‘TTYPE’) included in the list of TSPARAMCD with TSVAL populated is eq 1.
Authorities:
  - Organization: 'FDA'
    Standards:
      - Name: 'SDTMIG'
        References:
          - Citations:
              - Cited Guidance: 'TCG, Appendix B'
                Document: 'FDA'
                Section: 'FDAB011'
            Origin: 'FDA Business Rules'
            Rule Identifier:
              Id: 'FB1113'
              Version: '1'
            Version: '1.5'
        Version: '3.2'
      - Name: 'SDTMIG'
        References:
          - Citations:
              - Cited Guidance: 'TCG, Appendix B'
                Document: 'FDA'
                Section: 'FDAB011'
            Origin: 'FDA Business Rules'
            Rule Identifier:
              Id: 'FB1113'
              Version: '1'
            Version: '1.5'
        Version: '3.3'
      - Name: 'SDTMIG'
        References:
          - Citations:
              - Cited Guidance: 'TCG, Appendix B'
                Document: 'FDA'
                Section: 'FDAB011'
            Origin: 'FDA Business Rules'
            Rule Identifier:
              Id: 'FB1113'
              Version: '1'
            Version: '1.5'
        Version: '3.4'
Check:
  any:
    - all:
        - name: TSPARMCD
          operator: 'equal_to'
          value: 'ADDON'
          value_is_literal: true
        - name: TSVAL
          operator: 'equal_to'
          value: 'Y'
          value_is_literal: true
        - name: $tsparmcd
          operator: does_not_contain
          value: 'CURTRT'
          value_is_literal: true
    - all:
        - name: TSPARMCD
          operator: 'equal_to'
          value: 'ADDON'
          value_is_literal: true
        - name: TSVAL
          operator: 'equal_to'
          value: 'Y'
          value_is_literal: true
        - name: TSPARMCD
          operator: 'equal_to'
          value: 'CURTRT'
          value_is_literal: true
        - name: TSVAL
          operator: empty
Core:
  Id:
  Status: Draft
  Version: '1'
Description: The count of occurrences of TSPARAMCD = <value> not in the set
  ('FCNTRY', 'OBJPRIM', 'OBJSEC', 'OUTMSPRI', .'OUTMSSEC', 'RANDQT', 'REGID',
  'TITLE', 'TTYPE') included in the list of TSPARAMCD with TSVAL populated is eq
  1.
Executability: Fully Executable
Operations:
  - domain: TS
    id: $tsparmcd
    name: TSPARMCD
    operator: distinct
Outcome:
  Message: No occurrence of TSPARAMCD='CURTRT' is included in TS or TSVAL is
    null.The count of occurrences of TSPARAMCD = <value> not in the set
    ('FCNTRY', 'OBJPRIM', 'OBJSEC', 'OUTMSPRI', .'OUTMSSEC', 'RANDQT', 'REGID',
    'TITLE', 'TTYPE') included in the list of TSPARAMCD with TSVAL populated is
    gt 1.
  Output Variables:
    - TSPARMCD
    - TSVAL
    - $tsparmcd
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TS
Sensitivity: Record
