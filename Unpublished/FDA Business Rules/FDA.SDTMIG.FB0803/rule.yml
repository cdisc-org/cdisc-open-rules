# rule failure criteria: TSPARMCD.EXPSTDTC => EXSTDTC OR EXSTDTC => TSPARMCD.EXPENDTC
Check:
  all:
    - name: $ts_expstdtc_value
      operator: date_greater_than_or_equal_to
      value: --EXSTDTC
Core:
  Id: FDA.SDTMIG.FB0803
  Status: Draft
  Version: '1'
Description: Treatment exposure start date/time (EXSTDTC) should fall on or
  between the date/time experimental start (EXPSTDTC) and end date (EXPENDTC) in
  the TS dataset.
Executability: Fully Executable
Operations:
  - domain: TS
    filter:
      TSPARMCD: EXPSTDTC
    id: $ts_expstdtc_value
    name: TSVAL
    operator: distinct
Outcome:
  Message: EXSTDTC does not fall on or between EXPENDTC and EXPENDTC in TS dataset.
  Output Variables:
    - $ts_expstdtc_value
    - --EXSTDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
  Domains:
    Include:
      - EX
      - EC
Sensitivity: Record
