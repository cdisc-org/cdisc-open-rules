Authorities:
  - Organization: FDA
    Standards:
      # ONLY applicable to SENDIG, NOT to SDTMIG
      - Name: SENDIG
        References:
          - Citations:
              - Cited Guidance: 'The set of parameters without conditions listed in the TCG,
                  Appendix C, is not included in the list of TSPARAMCD with
                  TSVAL populated.'
                Document: FDA
                Section: FDAB011
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB1115
              Version: '1'
            Version: '1.5'
        Version: '3.0'
      - Name: SENDIG
        References:
          - Citations:
              - Cited Guidance: 'The set of parameters without conditions listed in the TCG,
                  Appendix C, is not included in the list of TSPARAMCD with
                  TSVAL populated.'
                Document: FDA
                Section: FDAB011
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB1115
              Version: '1'
            Version: '1.5'
        Version: '3.1'
      - Name: SENDIG
        References:
          - Citations:
              - Cited Guidance: 'The set of parameters without conditions listed in the TCG,
                  Appendix C, is not included in the list of TSPARAMCD with
                  TSVAL populated.'
                Document: FDA
