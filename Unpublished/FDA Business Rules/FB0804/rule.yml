# rule failure criteria: TSPARMCD.EXPSTDTC => EXENDTC or EXENDTC => TSPARMCD.EXPENDTC
Check:
  any:
    #- name: EXSTDTC
    #  operator: not_equal_to
    #  value: 'test'
    # TSPARMCD.EXPSTDTC => EXENDTC
    #- name: $ts_expstdtc_value
    #  operator: date_greater_than_or_equal_to
    #  value: EXENDTC
    # EXENDTC => TSPARMCD.EXPENDTC
    - name: --ENDTC
      operator: date_greater_than_or_equal_to
      value: $ts_expendtc_value
      #value: '2001-01-01'
Core:
  Status: Draft
  Version: '1'
Description: ''
Executability: Fully Executable
Operations:
  - domain: TS
    filter:
      TSPARMCD: EXPENDTC
    id: $ts_expendtc_value
    name: TSVAL
    operator: distinct
    value_is_reference: false
  - domain: TS
    filter:
      TSPARMCD: EXPSTDTC
    id: $ts_expstdtc_value
    name: TSVAL
    operator: distinct
Outcome:
  Message: 'Treatment exposure end date/time (EXENDTC) falls outside the date/time
    experimental start (EXPSTDTC) and end date (EXPENDTC) in the TS dataset.'
  Output Variables:
    - EXENDTC
    - $ts_expstdtc_value
    - $ts_expendtc_value
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
  Domains:
    Include:
      - EX
Sensitivity: Record
