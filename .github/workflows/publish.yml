name: Publish Rules

on:
  workflow_call:
  push:
    branches:
      - main

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files_ignore: |
            .github/**
            README.md
            .gitignore
            Published/**

      - name: Extract new rule directories
        id: newdirs
        run: |
          NEW_DIRS=""

          for file in ${{ steps.changed-files.outputs.added_files }}; do
            dir=$(dirname "$file")

            if [ -f "$dir/rule.yaml" ]; then
              NEW_DIRS="$NEW_DIRS $dir"
            fi
          done

          NEW_DIRS=$(echo $NEW_DIRS | xargs -n1 | sort -u | xargs)

          echo "NEW_DIRS=$NEW_DIRS"
          echo "NEW_DIRS=$NEW_DIRS" >> $GITHUB_OUTPUT

          if [ -z "$NEW_DIRS" ]; then
            echo "HAS_NEW_DIRS=false" >> $GITHUB_OUTPUT
          else
            echo "HAS_NEW_DIRS=true" >> $GITHUB_OUTPUT
          fi

      - name: Stop if nothing to publish
        if: steps.newdirs.outputs.HAS_NEW_DIRS == 'false'
        run: echo "No new rules found, skipping publish."

      - name: Setup Python
        if: steps.newdirs.outputs.HAS_NEW_DIRS == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.newdirs.outputs.HAS_NEW_DIRS == 'true'
        run: |
          pip install ruamel.yaml

      - name: Run publish script
        if: steps.newdirs.outputs.HAS_NEW_DIRS == 'true'
        run: |
          python .github/scripts/publish.py \
            --new-dirs "${{ steps.newdirs.outputs.NEW_DIRS }}" \
            --algorithm min

      - name: Regenerate mappings
        if: steps.newdirs.outputs.HAS_NEW_DIRS == 'true'
        run: |
          python .github/scripts/generate_mappings.py .

      - name: Commit changes
        if: steps.newdirs.outputs.HAS_NEW_DIRS == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Auto-publish new rules"
          fi

      - name: Push
        if: steps.newdirs.outputs.HAS_NEW_DIRS == 'true'
        run: |
          git push