name: Publish Rules

on:
  workflow_call:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files_ignore: |
            .github/**
            scripts/**
            mappings/**
            README.md
            .gitignore

      - name: Extract new rule directories
        id: newdirs
        run: |
          NEW_DIRS=""

          for file in ${{ steps.changed-files.outputs.added_files }}; do
            # Only process files that live under Rules/Unpublished/
            case "$file" in
              Rules/Unpublished/*) ;;
              *) continue ;;
            esac

            dir=$(dirname "$file")

            # Accept both rule.yaml and rule.yml
            if [ -f "$dir/rule.yaml" ] || [ -f "$dir/rule.yml" ]; then
              NEW_DIRS="$NEW_DIRS $dir"
            fi
          done

          # Deduplicate
          NEW_DIRS=$(echo $NEW_DIRS | xargs -n1 | sort -u | xargs)

          echo "NEW_DIRS=$NEW_DIRS"
          echo "NEW_DIRS=$NEW_DIRS" >> $GITHUB_OUTPUT

      - name: Stop if nothing to publish
        if: steps.newdirs.outputs.NEW_DIRS == ''
        run: |
          echo "No new rules found under Rules/Unpublished/"
          exit 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Run publish script
        run: |
          python scripts/publish.py \
            --new-dirs "${{ steps.newdirs.outputs.NEW_DIRS }}" \
            --algorithm min

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Auto-publish new rules" || exit 0

      - name: Push
        run: |
          git push